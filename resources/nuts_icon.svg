<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bear fur gradient -->
    <linearGradient id="bearFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0522d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b3410;stop-opacity:1" />
    </linearGradient>
    
    <!-- Bear face gradient -->
    <linearGradient id="bearFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d2691e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cd853f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Nutsack gradient -->
    <radialGradient id="nutsackGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </radialGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Fur texture -->
    <pattern id="furTexture" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r="0.5" fill="#000000" opacity="0.1"/>
      <circle cx="3" cy="3" r="0.5" fill="#000000" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f5f5dc" stroke="#8b4513" stroke-width="1.5"/>
  
  <!-- Bear's head/face -->
  <g transform="translate(32, 18)">
    <!-- Head circle -->
    <circle cx="0" cy="0" r="12" fill="url(#bearFace)" stroke="#6b3410" stroke-width="1.5" filter="url(#shadow)"/>
    
    <!-- Left ear -->
    <ellipse cx="-8" cy="-8" rx="4" ry="5" fill="url(#bearFur)" stroke="#6b3410" stroke-width="1"/>
    <ellipse cx="-8" cy="-8" rx="2" ry="2.5" fill="#8b4513"/>
    
    <!-- Right ear -->
    <ellipse cx="8" cy="-8" rx="4" ry="5" fill="url(#bearFur)" stroke="#6b3410" stroke-width="1"/>
    <ellipse cx="8" cy="-8" rx="2" ry="2.5" fill="#8b4513"/>
    
    <!-- Left eye -->
    <circle cx="-4" cy="-2" r="2.5" fill="#ffffff"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#000000"/>
    <circle cx="-3.5" cy="-2.5" r="0.5" fill="#ffffff"/>
    
    <!-- Right eye -->
    <circle cx="4" cy="-2" r="2.5" fill="#ffffff"/>
    <circle cx="4" cy="-2" r="1.5" fill="#000000"/>
    <circle cx="4.5" cy="-2.5" r="0.5" fill="#ffffff"/>
    
    <!-- Nose (triangular) -->
    <path d="M-2,2 L2,2 L0,5 Z" fill="#000000"/>
    
    <!-- Mouth (smile) -->
    <path d="M-3,6 Q0,8 3,6" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- The nutsack (two rounded shapes) -->
  <g transform="translate(32, 45)">
    <!-- Left nut -->
    <ellipse cx="-6" cy="0" rx="7" ry="9" fill="url(#nutsackGradient)" stroke="#6b3410" stroke-width="1.5" filter="url(#shadow)"/>
    <ellipse cx="-6" cy="2" rx="5" ry="6" fill="#a0826d" opacity="0.3"/>
    
    <!-- Right nut -->
    <ellipse cx="6" cy="0" rx="7" ry="9" fill="url(#nutsackGradient)" stroke="#6b3410" stroke-width="1.5" filter="url(#shadow)"/>
    <ellipse cx="6" cy="2" rx="5" ry="6" fill="#a0826d" opacity="0.3"/>
    
    <!-- Connecting area (scrotum) -->
    <ellipse cx="0" cy="0" rx="4" ry="8" fill="url(#nutsackGradient)" stroke="#6b3410" stroke-width="1"/>
    
    <!-- Fur texture overlay -->
    <rect x="-13" y="-9" width="26" height="18" fill="url(#furTexture)" opacity="0.2"/>
  </g>
  
  <!-- Optional: Small git arrows around (subtle) -->
  <g transform="translate(32, 32)" opacity="0.6">
    <!-- Top arrow -->
    <path d="M-1.5,-24 L1.5,-24 L0,-27 Z" fill="#8b4513"/>
    <line x1="0" y1="-24" x2="0" y2="-20" stroke="#8b4513" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Bottom arrow -->
    <path d="M-1.5,24 L1.5,24 L0,27 Z" fill="#8b4513"/>
    <line x1="0" y1="24" x2="0" y2="20" stroke="#8b4513" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
